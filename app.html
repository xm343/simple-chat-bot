<!doctype html>
<html>
  <head>
    <title>React Basics</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        background-color: #f7f9fa;
      }
      .app-container {
        width: 100%;
        max-width: 600px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background-color: white;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
      }
      .chat-messages-container {
        flex-grow: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .chat-message-user {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
      }
      .chat-message-robot {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 10px;
      }
      .chat-message {
        background-color: rgb(238, 238, 238);
        padding: 12px 18px;
        border-radius: 15px;
        max-width: 70%;
        word-break: break-word;
      }
      .chat-message-user .chat-message {
        background-color: #0084ff;
        color: white;
      }
      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
      }
      .search-container {
        padding: 20px;
        display: flex;
        border-top: 1px solid #ddd;
        background-color: white;
      }
      .chat-input {
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 15px;
        border: 1px solid #ccc;
        flex-grow: 1;
        outline: none;
      }
      .send-button {
        background-color: green;
        color: white;
        border-radius: 10px;
        border: none;
        padding: 12px 20px;
        margin-left: 10px;
        font-size: 15px;
        cursor: pointer;
      }
      .js-container {
        width: 100%;
        display: flex;
        justify-content: center;
      }
    </style>
  </head>

  <body>
    <div class="js-container"></div>

    
    <script src="react.js"></script>
    <script src="chatbot.js"></script>
    <script src="react-dom.js"></script>
    <script src="babel.js"></script>

    <script type="text/babel">
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState('')
        function saveInputText(event){
          setInputText(event.target.value)
        }
        function sendMessage(){
          if (!inputText.trim()) return;
          const userMessageId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(36).substr(2, 9);
          const robotMessageId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(36).substr(2, 9);
          const response = chatbot.getResponse(inputText)

          setChatMessages([
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: userMessageId
            },
            {
              message: response,
              sender: 'robot',
              id: robotMessageId
            }
          ])

          setInputText('')
        }
        function handleKeyDown(event) {
          if (event.key === 'Enter') {
            sendMessage();
          }
        }
        return (
          <div className='search-container'> 
            <input 
              className='chat-input' 
              placeholder="Send message to ChatBot" 
              onChange={saveInputText} 
              onKeyDown={handleKeyDown}
              value={inputText}
            />
            <button className = "send-button" onClick={sendMessage}>Send</button>
          </div>
        );
      }

      function Chat({ message, sender }) {
        return (
          <div className={sender==='user'?'chat-message-user':'chat-message-robot'}>
            {sender === "robot" && (
              <img className="avatar" src="robot.png" alt="robot"></img>
            )}
            <div className='chat-message'>{message}</div>
            
            {sender === "user" && (
              <img className="avatar" src="user.png" alt="user"></img>
            )}
          </div>
        );
      }

      function ChatMessages({chatMessages}){
        const messagesEndRef = React.useRef(null);

        React.useEffect(() => {
          messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        }, [chatMessages]);

        return (
          <div className="chat-messages-container">
            {chatMessages.map((chatMessage) => {
              return (
                <Chat
                  key={chatMessage.id}
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                />
              );
            })}
            <div ref={messagesEndRef} />
          </div>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState([
          {
            message: "Hello ChatBot",
            sender: "user",
            id: "id1",
          },
          {
            message: "How can I help you ?",
            sender: "robot",
            id: "id2",
          },
          {
            message: "What is today`s date",
            sender: "user",
            id: "id3",
          },
          {
            message: "Its June 5 2026",
            sender: "robot",
            id: "id4",
          },
        ])

        return (
          <div className="app-container">
            <ChatMessages 
              chatMessages = {chatMessages}
            />
            <ChatInput 
              chatMessages = {chatMessages}
              setChatMessages = {setChatMessages}
            />
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
